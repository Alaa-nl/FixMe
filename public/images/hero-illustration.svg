<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <!-- Background card shape -->
  <rect x="20" y="20" width="440" height="320" rx="32" fill="#FAFAF8"/>
  <rect x="20" y="20" width="440" height="320" rx="32" stroke="#1B4965" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#1B4965" fill-opacity="0.05"/>
    </pattern>
    <linearGradient id="warmGrad" x1="0" y1="0" x2="480" y2="360">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#1B4965" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="phoneGrad" x1="160" y1="50" x2="320" y2="310">
      <stop offset="0%" stop-color="#1B4965"/>
      <stop offset="100%" stop-color="#113145"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="180" y1="80" x2="300" y2="280">
      <stop offset="0%" stop-color="#FAFAF8"/>
      <stop offset="100%" stop-color="#F5F3F0"/>
    </linearGradient>
    <linearGradient id="orangeBtn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#E55A25"/>
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="440" height="320" rx="32" fill="url(#warmGrad)"/>
  <rect x="20" y="20" width="440" height="320" rx="32" fill="url(#grid)"/>

  <!-- Phone mockup -->
  <rect x="165" y="45" width="150" height="270" rx="20" fill="url(#phoneGrad)" />
  <rect x="165" y="45" width="150" height="270" rx="20" stroke="#0C2435" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Phone screen -->
  <rect x="173" y="60" width="134" height="240" rx="12" fill="url(#screenGrad)"/>

  <!-- Phone notch -->
  <rect x="215" y="50" width="50" height="6" rx="3" fill="#0C2435" fill-opacity="0.5"/>

  <!-- Screen content: Chat messages -->
  <!-- Received message -->
  <rect x="182" y="80" width="85" height="22" rx="10" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="0.5"/>
  <rect x="188" y="86" width="50" height="4" rx="2" fill="#1B4965" fill-opacity="0.4"/>
  <rect x="188" y="93" width="30" height="3" rx="1.5" fill="#1B4965" fill-opacity="0.15"/>

  <!-- Sent message (orange) -->
  <rect x="228" y="112" width="72" height="22" rx="10" fill="#FF6B35"/>
  <rect x="234" y="118" width="45" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.9"/>
  <rect x="234" y="125" width="25" height="3" rx="1.5" fill="#FFFFFF" fill-opacity="0.5"/>

  <!-- Offer card in chat -->
  <rect x="182" y="145" width="116" height="65" rx="10" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="0.5"/>
  <!-- Offer header -->
  <circle cx="194" cy="158" r="7" fill="#1B4965" fill-opacity="0.15"/>
  <rect x="206" y="155" width="40" height="4" rx="2" fill="#1B4965" fill-opacity="0.5"/>
  <!-- Price -->
  <rect x="189" y="169" width="55" height="8" rx="3" fill="#1B4965" fill-opacity="0.7"/>
  <!-- Accept button -->
  <rect x="189" y="184" width="45" height="16" rx="6" fill="#2D6A4F"/>
  <rect x="196" y="190" width="30" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.9"/>
  <!-- Decline button -->
  <rect x="240" y="184" width="50" height="16" rx="6" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="0.5"/>
  <rect x="249" y="190" width="30" height="4" rx="2" fill="#999999" fill-opacity="0.6"/>

  <!-- Job status card -->
  <rect x="182" y="220" width="116" height="30" rx="10" fill="#F0FFF4" stroke="#2D6A4F" stroke-opacity="0.2" stroke-width="0.5"/>
  <circle cx="196" cy="235" r="6" fill="#2D6A4F" fill-opacity="0.15"/>
  <path d="M193 235l2 2 4-4" stroke="#2D6A4F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="207" y="231" width="55" height="4" rx="2" fill="#2D6A4F" fill-opacity="0.5"/>
  <rect x="207" y="238" width="35" height="3" rx="1.5" fill="#2D6A4F" fill-opacity="0.25"/>

  <!-- Star rating in chat -->
  <rect x="182" y="258" width="116" height="32" rx="10" fill="#FFFBF0" stroke="#E9C46A" stroke-opacity="0.3" stroke-width="0.5"/>
  <g transform="translate(195, 267)">
    <polygon points="5,0 6.5,3 10,3.5 7.5,6 8,9.5 5,8 2,9.5 2.5,6 0,3.5 3.5,3" fill="#E9C46A" transform="scale(0.7)"/>
    <polygon points="5,0 6.5,3 10,3.5 7.5,6 8,9.5 5,8 2,9.5 2.5,6 0,3.5 3.5,3" fill="#E9C46A" transform="translate(9,0) scale(0.7)"/>
    <polygon points="5,0 6.5,3 10,3.5 7.5,6 8,9.5 5,8 2,9.5 2.5,6 0,3.5 3.5,3" fill="#E9C46A" transform="translate(18,0) scale(0.7)"/>
    <polygon points="5,0 6.5,3 10,3.5 7.5,6 8,9.5 5,8 2,9.5 2.5,6 0,3.5 3.5,3" fill="#E9C46A" transform="translate(27,0) scale(0.7)"/>
    <polygon points="5,0 6.5,3 10,3.5 7.5,6 8,9.5 5,8 2,9.5 2.5,6 0,3.5 3.5,3" fill="#E9C46A" transform="translate(36,0) scale(0.7)"/>
  </g>
  <rect x="245" y="269" width="40" height="4" rx="2" fill="#B8860B" fill-opacity="0.3"/>

  <!-- Phone home bar -->
  <rect x="215" y="292" width="50" height="4" rx="2" fill="#1B4965" fill-opacity="0.3"/>

  <!-- Floating elements around the phone -->

  <!-- Wrench icon — top left -->
  <g transform="translate(62, 72)">
    <circle cx="22" cy="22" r="22" fill="#FF6B35" fill-opacity="0.08"/>
    <path d="M30 14l-3.5 3.5a5.3 5.3 0 01-7 7L16 28l-2-2 3.5-3.5a5.3 5.3 0 017-7L28 12l2 2z" stroke="#FF6B35" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Shield/trust icon — top right -->
  <g transform="translate(360, 58)">
    <circle cx="22" cy="22" r="22" fill="#2D6A4F" fill-opacity="0.08"/>
    <path d="M22 12l8 4v6c0 5.5-3.5 10.5-8 12-4.5-1.5-8-6.5-8-12v-6l8-4z" stroke="#2D6A4F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M18 22l3 3 5-5" stroke="#2D6A4F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Chat bubble icon — bottom left -->
  <g transform="translate(58, 230)">
    <circle cx="20" cy="20" r="20" fill="#1B4965" fill-opacity="0.06"/>
    <path d="M12 15h16a2 2 0 012 2v8a2 2 0 01-2 2H16l-4 3v-3a2 2 0 01-2-2v-8a2 2 0 012-2z" stroke="#1B4965" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="16" y1="20" x2="24" y2="20" stroke="#1B4965" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="16" y1="24" x2="21" y2="24" stroke="#1B4965" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- Euro/payment icon — bottom right -->
  <g transform="translate(370, 245)">
    <circle cx="18" cy="18" r="18" fill="#FF6B35" fill-opacity="0.06"/>
    <circle cx="18" cy="18" r="10" stroke="#FF6B35" stroke-width="1.5" fill="none"/>
    <text x="14.5" y="22.5" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FF6B35">€</text>
  </g>

  <!-- Connection dots/lines -->
  <circle cx="120" cy="130" r="2" fill="#FF6B35" fill-opacity="0.15"/>
  <circle cx="365" cy="160" r="2.5" fill="#1B4965" fill-opacity="0.12"/>
  <circle cx="100" cy="200" r="1.5" fill="#2D6A4F" fill-opacity="0.15"/>
  <circle cx="390" cy="200" r="2" fill="#E9C46A" fill-opacity="0.2"/>
  <circle cx="135" cy="280" r="1.5" fill="#FF6B35" fill-opacity="0.1"/>
  <circle cx="350" cy="300" r="2" fill="#1B4965" fill-opacity="0.1"/>
</svg>
